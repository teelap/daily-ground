<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Ground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f0e8;
      --bg-card: #fffdf8;
      --ink: #2c2416;
      --ink-light: #6b5e4a;
      --accent: #8b6f47;
      --accent-soft: #c4a882;
      --border: #e2d9cc;
      --shadow: rgba(44, 36, 22, 0.08);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(196, 168, 130, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 111, 71, 0.08) 0%, transparent 50%);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent-soft);
      margin-bottom: 3rem;
      opacity: 0;
      animation: rise 1s ease forwards 0.2s;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3.5rem 4rem;
      max-width: 680px;
      width: 100%;
      box-shadow:
        0 2px 8px var(--shadow),
        0 12px 40px rgba(44, 36, 22, 0.04);
      opacity: 0;
      animation: rise 1s ease forwards 0.5s;
      position: relative;
    }

    .card::before {
      content: '\201C';
      font-family: 'Cormorant Garamond', serif;
      font-size: 8rem;
      line-height: 1;
      color: var(--accent-soft);
      opacity: 0.25;
      position: absolute;
      top: 1.5rem;
      left: 2.5rem;
      pointer-events: none;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 3.5vw, 1.85rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.65;
      color: var(--ink);
      position: relative;
      z-index: 1;
    }

    .divider {
      width: 2.5rem;
      height: 1px;
      background: var(--accent-soft);
      margin: 2rem 0;
    }

    .attribution {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .author {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .context {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      font-weight: 300;
      opacity: 0.7;
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-soft);
      opacity: 0;
      animation: rise 1s ease forwards 0.9s;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent-soft);
      opacity: 0.5;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .card {
        padding: 2.5rem 2rem;
      }
      .card::before {
        font-size: 6rem;
        top: 1rem;
        left: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <p class="wordmark">Daily Ground</p>

  <div class="card">
    <p class="quote-text" id="quote-text"></p>
    <div class="divider"></div>
    <div class="attribution">
      <span class="author" id="quote-author"></span>
      <span class="context" id="quote-context"></span>
    </div>
  </div>

  <div class="footer">
    <span id="footer-date"></span>
    <span class="footer-dot"></span>
    <span>one quote a day</span>
  </div>

  <script>
    function formatDate(date) {
      return date.toLocaleDateString('en-US', {
        weekday: 'long',
        month: 'long',
        day: 'numeric',
        year: 'numeric'
      });
    }

    document.getElementById('footer-date').textContent = formatDate(new Date());

    fetch('/api/quote')
      .then(r => r.json())
      .then(quote => {
        document.getElementById('quote-text').textContent = quote.text;
        document.getElementById('quote-author').textContent = quote.author;
        document.getElementById('quote-context').textContent = quote.context;
      })
      .catch(() => {
        document.getElementById('quote-text').textContent = 'Be here now.';
        document.getElementById('quote-author').textContent = 'Ram Dass';
        document.getElementById('quote-context').textContent = 'Be Here Now, 1971';
      });
  </script>
</body>
</html>
