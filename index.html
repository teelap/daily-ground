<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Ground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f0e8;
      --bg-card: #fffdf8;
      --ink: #2c2416;
      --ink-light: #6b5e4a;
      --accent: #8b6f47;
      --accent-soft: #c4a882;
      --border: #e2d9cc;
      --shadow: rgba(44, 36, 22, 0.08);
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(196, 168, 130, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 111, 71, 0.08) 0%, transparent 50%);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent-soft);
      margin-bottom: 3rem;
      opacity: 0;
      animation: rise 1s ease forwards 0.2s;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3.5rem 4rem 2.5rem;
      max-width: 680px;
      width: 100%;
      box-shadow:
        0 2px 8px var(--shadow),
        0 12px 40px rgba(44, 36, 22, 0.04);
      opacity: 0;
      animation: rise 1s ease forwards 0.5s;
      position: relative;
    }

    .card::before {
      content: '\201C';
      font-family: 'Cormorant Garamond', serif;
      font-size: 8rem;
      line-height: 1;
      color: var(--accent-soft);
      opacity: 0.25;
      position: absolute;
      top: 1.5rem;
      left: 2.5rem;
      pointer-events: none;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 3.5vw, 1.85rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.65;
      color: var(--ink);
      position: relative;
      z-index: 1;
    }

    .divider {
      width: 2.5rem;
      height: 1px;
      background: var(--accent-soft);
      margin: 2rem 0;
    }

    .attribution {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .author {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .context {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      font-weight: 300;
      opacity: 0.7;
    }

    /* ── Audio button ── */
    .audio-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .play-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: 1px solid var(--accent-soft);
      border-radius: 2px;
      padding: 0.5rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .play-btn:hover:not(:disabled) {
      background: var(--accent-soft);
      color: var(--bg-card);
      border-color: var(--accent-soft);
    }

    .play-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .play-btn svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .audio-status {
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--ink-light);
      opacity: 0.6;
      font-style: italic;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-soft);
      opacity: 0;
      animation: rise 1s ease forwards 0.9s;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent-soft);
      opacity: 0.5;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .card { padding: 2.5rem 2rem 2rem; }
      .card::before { font-size: 6rem; top: 1rem; left: 1.5rem; }
    }
  </style>
</head>
<body>

  <p class="wordmark">Daily Ground</p>

  <div class="card">
    <p class="quote-text" id="quote-text"></p>
    <div class="divider"></div>
    <div class="attribution">
      <span class="author" id="quote-author"></span>
      <span class="context" id="quote-context"></span>
    </div>
    <div class="audio-row">
      <button class="play-btn" id="play-btn" disabled>
        <svg id="play-icon" viewBox="0 0 12 12" fill="currentColor">
          <polygon points="2,1 11,6 2,11"/>
        </svg>
        <svg id="stop-icon" viewBox="0 0 12 12" fill="currentColor" style="display:none">
          <rect x="2" y="1" width="3" height="10"/>
          <rect x="7" y="1" width="3" height="10"/>
        </svg>
        <span id="play-label">Listen</span>
      </button>
      <span class="audio-status" id="audio-status"></span>
    </div>
  </div>

  <div class="footer">
    <span id="footer-date"></span>
    <span class="footer-dot"></span>
    <span>one quote a day</span>
  </div>

  <script>
    let quote = null;
    let musicAudio = null;
    let voiceAudio = null;
    let isPlaying = false;

    const playBtn    = document.getElementById('play-btn');
    const playIcon   = document.getElementById('play-icon');
    const stopIcon   = document.getElementById('stop-icon');
    const playLabel  = document.getElementById('play-label');
    const statusEl   = document.getElementById('audio-status');

    function formatDate(date) {
      return date.toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    function fadeVolume(audio, from, to, ms) {
      const steps = 30;
      const interval = ms / steps;
      const delta = (to - from) / steps;
      let step = 0;
      audio.volume = from;
      const t = setInterval(() => {
        step++;
        audio.volume = Math.min(1, Math.max(0, from + delta * step));
        if (step >= steps) clearInterval(t);
      }, interval);
    }

    function stopAll() {
      if (musicAudio) { fadeVolume(musicAudio, musicAudio.volume, 0, 800); setTimeout(() => { musicAudio.pause(); musicAudio.currentTime = 0; }, 850); }
      if (voiceAudio) { voiceAudio.pause(); voiceAudio.currentTime = 0; }
      isPlaying = false;
      playIcon.style.display = '';
      stopIcon.style.display = 'none';
      playLabel.textContent = 'Listen';
      setStatus('');
    }

    async function play() {
      if (isPlaying) { stopAll(); return; }
      if (!quote) return;

      isPlaying = true;
      playBtn.disabled = true;
      playIcon.style.display = 'none';
      stopIcon.style.display = '';
      playLabel.textContent = 'Stop';
      setStatus('Generating…');

      try {
        const musicUrl = `/api/music?author=${encodeURIComponent(quote.author)}`;
        const voiceUrl = `/api/audio?index=${quote.index}&text=${encodeURIComponent(quote.text)}&author=${encodeURIComponent(quote.author)}`;

        // Pre-fetch both in parallel so they're in browser cache
        const [musicFetch, voiceFetch] = await Promise.all([
          fetch(musicUrl),
          fetch(voiceUrl),
        ]);

        if (!musicFetch.ok || !voiceFetch.ok) throw new Error('Audio generation failed');

        const [musicBlob, voiceBlob] = await Promise.all([
          musicFetch.blob(),
          voiceFetch.blob(),
        ]);

        const musicObjectUrl = URL.createObjectURL(musicBlob);
        const voiceObjectUrl = URL.createObjectURL(voiceBlob);

        // Start music quietly, fade up over 2.5s
        musicAudio = new Audio(musicObjectUrl);
        musicAudio.loop = true;
        musicAudio.volume = 0;
        await musicAudio.play();
        fadeVolume(musicAudio, 0, 0.20, 2500);

        setStatus('');

        // Let the music establish itself before the voice enters
        await new Promise(r => setTimeout(r, 4000));
        if (!isPlaying) return;

        voiceAudio = new Audio(voiceObjectUrl);
        voiceAudio.volume = 1;
        voiceAudio.play();

        voiceAudio.onended = () => {
          // Music lingers for 6 seconds after voice finishes
          setTimeout(() => { if (isPlaying) stopAll(); }, 6000);
          URL.revokeObjectURL(voiceObjectUrl);
        };

        voiceAudio.onerror = () => { stopAll(); URL.revokeObjectURL(voiceObjectUrl); };
        musicAudio.onended = () => URL.revokeObjectURL(musicObjectUrl);
      } catch (e) {
        console.error(e);
        setStatus('Audio unavailable');
        stopAll();
      } finally {
        playBtn.disabled = false;
      }
    }

    playBtn.addEventListener('click', play);

    document.getElementById('footer-date').textContent = formatDate(new Date());

    fetch('/api/quote')
      .then(r => r.json())
      .then(q => {
        quote = q;
        document.getElementById('quote-text').textContent = q.text;
        document.getElementById('quote-author').textContent = q.author;
        document.getElementById('quote-context').textContent = q.context;
        playBtn.disabled = false;
      })
      .catch(() => {
        document.getElementById('quote-text').textContent = 'Be here now.';
        document.getElementById('quote-author').textContent = 'Ram Dass';
        document.getElementById('quote-context').textContent = 'Be Here Now, 1971';
      });
  </script>
</body>
</html>
